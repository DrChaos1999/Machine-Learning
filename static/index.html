<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Professor Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #1a1510;
      --paper:   #f5f0e8;
      --cream:   #ede8dc;
      --accent:  #c0392b;
      --accent2: #2c6e8a;
      --gold:    #b8860b;
      --muted:   #8a7f72;
      --border:  #d4ccc0;
      --card:    #faf7f2;
      --shadow:  rgba(26,21,16,0.10);
    }

    html, body {
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--paper);
      padding: 36px 40px 30px;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2));
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .brand h1 span { color: var(--gold); font-style: italic; }

    .brand p {
      margin-top: 6px;
      font-size: 0.78rem;
      color: rgba(245,240,232,0.55);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .badge-powered {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.4);
      border: 1px solid rgba(245,240,232,0.15);
      padding: 5px 10px;
      border-radius: 2px;
    }

    /* ── Search form ── */
    .search-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 40px 0;
    }

    .search-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 620px) { .form-grid { grid-template-columns: 1fr; } }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .field input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      padding: 12px 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--muted); opacity: 0.7; }
    .field input:focus {
      outline: none;
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(44,110,138,0.1);
    }

    .search-btn {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button#find-btn {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 13px 28px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }

    button#find-btn:hover:not(:disabled) { background: #a93226; }
    button#find-btn:active:not(:disabled) { transform: scale(0.98); }
    button#find-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Chips */
    .chips {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      font-size: 0.68rem;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--cream);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }

    .chip:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(44,110,138,0.05); }

    /* Divider */
    .divider {
      max-width: 900px;
      margin: 36px auto 0;
      padding: 0 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ── Results ── */
    #results-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 40px 60px;
    }

    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .results-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .results-meta {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Queries used */
    .queries-used {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .queries-used summary {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .queries-used ol {
      margin-top: 10px;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .queries-used li {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink);
    }

    /* Professor cards */
    .prof-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .prof-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      box-shadow: 0 2px 8px var(--shadow);
      animation: card-in 0.35s ease forwards;
      opacity: 0;
      transform: translateY(10px);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .prof-card:hover {
      box-shadow: 0 6px 20px var(--shadow);
      transform: translateY(-2px);
    }

    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-rank {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--border);
      line-height: 1;
      text-align: right;
      min-width: 36px;
      padding-top: 2px;
    }

    .prof-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
    }

    .prof-title-dept {
      font-size: 0.78rem;
      color: var(--accent2);
      font-weight: 500;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .prof-interests {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .interest-tag {
      font-size: 0.65rem;
      padding: 3px 10px;
      background: rgba(26,21,16,0.06);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
    }

    .prof-relevance {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      font-style: italic;
      border-left: 2px solid var(--gold);
      padding-left: 10px;
    }

    .prof-links {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .prof-link {
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      color: var(--accent2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .prof-link:hover { color: var(--accent); text-decoration: underline; }

    .prof-email {
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    /* Loading state */
    .loading-state {
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: center;
    }

    .loading-step {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: step-fade 0.4s ease forwards;
    }

    @keyframes step-fade { to { opacity: 1; } }

    /* Error */
    .error-box {
      background: rgba(192,57,43,0.06);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 3px;
      padding: 16px 20px;
      color: var(--accent);
      font-size: 0.82rem;
    }

    /* Empty / no results */
    .empty-box {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .empty-box .empty-icon { font-size: 2.5rem; opacity: 0.3; margin-bottom: 12px; }
    .empty-box p { font-size: 0.85rem; }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>Professor <span>Finder</span></h1>
        <p>Academic Research Intelligence Agent</p>
      </div>
      <div class="badge-powered">LangGraph · Tavily · GPT-4o-mini</div>
    </div>
  </header>

  <!-- Search -->
  <section class="search-section">
    <span class="search-label">Find researchers by university & topic</span>

    <div class="form-grid">
      <div class="field">
        <label>University</label>
        <input type="text" id="university" placeholder="e.g. MIT, Stanford University, ETH Zurich" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Research Interests</label>
        <input type="text" id="interests" placeholder="e.g. deep learning, computer vision, NLP" autocomplete="off"/>
      </div>
    </div>

    <div class="search-btn">
      <button id="find-btn" onclick="doSearch()">Search Professors</button>
      <span class="hint">Agent will generate queries, search the web, and extract profiles.</span>
    </div>

    <!-- Example chips -->
    <div class="chips">
      <span style="font-size:0.68rem;color:var(--muted);align-self:center;">Try:</span>
      <span class="chip" onclick="fillExample('MIT','deep learning robotics')">MIT · Deep Learning Robotics</span>
      <span class="chip" onclick="fillExample('Stanford University','large language models NLP')">Stanford · LLMs & NLP</span>
      <span class="chip" onclick="fillExample('Carnegie Mellon University','computer vision autonomous driving')">CMU · Computer Vision</span>
      <span class="chip" onclick="fillExample('University of Toronto','reinforcement learning')">UofT · RL</span>
    </div>
  </section>

  <div class="divider"></div>

  <!-- Results -->
  <section id="results-section" style="display:none"></section>

</div>

<script>
  function fillExample(uni, interests) {
    document.getElementById('university').value = uni;
    document.getElementById('interests').value = interests;
  }

  // Animate cards one by one
  function staggerCards() {
    document.querySelectorAll('.prof-card').forEach((card, i) => {
      card.style.animationDelay = `${i * 80}ms`;
    });
  }

  // Loading step messages
  const steps = [
    '① Generating targeted search queries…',
    '② Searching the web via Tavily…',
    '③ Extracting professor profiles with GPT-4o-mini…',
    '④ Ranking and deduplicating results…',
  ];

  function showLoading() {
    const el = document.getElementById('results-section');
    el.style.display = 'block';
    el.innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-steps" id="steps"></div></div>`;

    const stepsEl = document.getElementById('steps');
    steps.forEach((s, i) => {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'loading-step';
        d.textContent = s;
        stepsEl.appendChild(d);
      }, i * 1800);
    });
  }

  function renderResults(data) {
    const el = document.getElementById('results-section');

    if (data.error) {
      el.innerHTML = `<div class="error-box">⚠ ${escHtml(data.error)}</div>`;
      return;
    }

    const profs = data.professors;

    // Queries section
    const queriesHtml = data.search_queries?.length ? `
      <details class="queries-used">
        <summary>Search queries used (${data.search_queries.length})</summary>
        <ol>${data.search_queries.map(q => `<li>${escHtml(q)}</li>`).join('')}</ol>
      </details>
    ` : '';

    // Professor cards
    let cardsHtml = '';
    if (profs.length === 0) {
      cardsHtml = `
        <div class="empty-box">
          <div class="empty-icon">🔍</div>
          <p>No professors found. Try a different university name or broader research interests.</p>
        </div>`;
    } else {
      cardsHtml = `<div class="prof-grid">${profs.map((p, i) => profCard(p, i + 1)).join('')}</div>`;
    }

    el.innerHTML = `
      <div class="results-header">
        <span class="results-title">Results for <em>${escHtml(data.university)}</em></span>
        <span class="results-meta">${profs.length} professor${profs.length !== 1 ? 's' : ''} found · "${escHtml(data.research_interests)}"</span>
      </div>
      ${queriesHtml}
      ${cardsHtml}
    `;
    staggerCards();
  }

  function profCard(p, rank) {
    const interests = (p.research_interests || [])
      .map(t => `<span class="interest-tag">${escHtml(t)}</span>`).join('');

    const links = [];
    if (p.profile_url) {
      links.push(`<a class="prof-link" href="${escHtml(p.profile_url)}" target="_blank" rel="noopener">↗ Profile Page</a>`);
    }
    if (p.email) {
      links.push(`<span class="prof-email">✉ ${escHtml(p.email)}</span>`);
    }

    return `
      <div class="prof-card">
        <div>
          <div class="prof-name">${escHtml(p.name)}</div>
          <div class="prof-title-dept">${escHtml(p.title)}${p.department ? ' · ' + escHtml(p.department) : ''}</div>
          <div class="prof-interests">${interests}</div>
          ${p.relevance_summary ? `<div class="prof-relevance">${escHtml(p.relevance_summary)}</div>` : ''}
          ${links.length ? `<div class="prof-links">${links.join('')}</div>` : ''}
        </div>
        <div class="card-rank">${String(rank).padStart(2, '0')}</div>
      </div>`;
  }

  async function doSearch() {
    const university = document.getElementById('university').value.trim();
    const interests  = document.getElementById('interests').value.trim();

    if (!university || !interests) {
      alert('Please enter both a university name and research interests.');
      return;
    }

    const btn = document.getElementById('find-btn');
    btn.disabled = true;
    btn.textContent = 'Searching…';

    showLoading();

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ university, research_interests: interests }),
      });
      const data = await res.json();

      if (!res.ok) {
        renderResults({ error: data.detail || 'Server error', professors: [] });
      } else {
        renderResults(data);
      }
    } catch (e) {
      renderResults({ error: 'Could not reach the server. Is it running?', professors: [] });
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search Professors';
    }
  }

  // Enter key support
  ['university', 'interests'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  });

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
